# WCNP deployment config for QuizBlitz
# Docs: https://dx.walmart.com/documents/product/KITT
# Replace <YOUR_NAMESPACE> and <YOUR_IMAGE_REPO> before deploying.

spec:
  # --- App identity ---
  appName: quizblitz
  team: <YOUR_TEAM_NAME>
  namespace: <YOUR_NAMESPACE>            # e.g. myteam-dev / myteam-prod

  # --- Container image ---
  # Build via Looper and push to your Walmart Artifactory Docker repo
  image: <YOUR_IMAGE_REPO>/quizblitz     # e.g. docker.ci.artifacts.walmart.com/myteam/quizblitz

  # --- Replicas & scaling ---
  replicas: 2                            # minimum 2 for HA
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60   # scale out earlier for WebSocket bursts

  # --- Resources ---
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  # --- Container port ---
  containerPort: 3000

  # --- Health checks ---
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10

  # --- Environment ---
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3000"

  # --- Ingress (internal Walmart network only) ---
  ingress:
    enabled: true
    host: quizblitz.<YOUR_NAMESPACE>.walmart.com   # update per your WCNP cluster domain
    annotations:
      kubernetes.io/ingress.class: "nginx"

  # --- WebSocket: disable proxy buffering so Socket.io works ---
  # Add these annotations if using WCNP's nginx ingress controller
  ingressAnnotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

  # --- Cloud placement ---
  # Use Azure or GCP for elastic WebSocket workloads (not private cloud)
  cloud: azure                           # or: gcp
