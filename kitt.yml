# WCNP / KITT deployment config for QuizBlitz
# Docs: https://dx.walmart.com/documents/product/KITT
#
# Replace every value marked <REPLACE_*> before your first deploy.
# Minimum fields required by KITT Quick Start are all present below.

build:
  artifact: quizblitz                       # Looper build artifact name

deploy:
  namespace: project-backbone           # e.g. myteam-dev or project-quizblitz
  helm:
    values:
      scaling:
        enabled: false
        replicas: 1
      networking:
        externalPort: 3000
      env:
        APP_NAME: quiz-blitz
        PORT: "3000"
        WM_ENV: "{{$.kittExec.currentStage.name}}"
        APP_VERSION: "{{$.kitt.build.version}}"
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
      scaling:
        enabled: true
        cpuPercent: 60
        min: 2
        max: 10
  stages:
    - name: dev
      refs: [main]
      target:
        - cluster_id: [scus-dev-a4]   # e.g. uswest-stage-az-001

notify:
  slack:
    channelName: quiz-blitz    # e.g. quizblitz-deploys

owner:
  group: project-backbone              # e.g. sec-project-quizblitz

alerts:
  slackChannel:
    - quiz-blitz             # e.g. quizblitz-alerts
