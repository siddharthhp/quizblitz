<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0c29" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>QuizBlitz — Join</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="landing">
    <main class="card">
      <h1 class="logo">⚡ QuizBlitz</h1>
      <p class="tagline">Live multiplayer quizzes. Up to 400 players per room.</p>

      <section class="join">
        <h2>Join a game</h2>
        <form id="joinForm">
          <input
            type="text"
            id="code"
            placeholder="ROOM CODE"
            maxlength="6"
            autocomplete="off"
            autocapitalize="characters"
            inputmode="text"
            spellcheck="false"
            required
          />
          <input
            type="text"
            id="name"
            placeholder="Your name"
            maxlength="24"
            autocomplete="nickname"
            autocapitalize="words"
            inputmode="text"
            required
          />
          <button type="submit" class="primary">Join →</button>
        </form>
        <div id="formMsg" class="msg" style="min-height:1.4em;margin-top:6px;"></div>
      </section>

      <section class="host-cta">
        <h2>Hosting?</h2>
        <a class="ghost" href="/host.html">Create a room →</a>
      </section>
    </main>
    <script>
      document.getElementById('joinForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const code = document.getElementById('code').value.trim().toUpperCase();
        const name = document.getElementById('name').value.trim();
        const msg = document.getElementById('formMsg');
        if (!code) { msg.textContent = 'Enter a room code.'; msg.className = 'msg error'; return; }
        if (!name) { msg.textContent = 'Enter your name.'; msg.className = 'msg error'; return; }
        msg.textContent = '';
        sessionStorage.setItem('qb:name', name);
        sessionStorage.setItem('qb:code', code);
        location.href = '/player.html';
      });
    </script>
  </body>
</html>
