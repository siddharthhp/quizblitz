<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0071dc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>BrainBlitz — Join</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .avatar-section {
        margin: 4px 0 0;
      }
      .avatar-label {
        font-size: 13px;
        font-weight: 600;
        color: #546e7a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        text-align: left;
      }
      .avatar-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .avatar-btn {
        font-size: 28px;
        width: 52px;
        height: 52px;
        border-radius: 12px;
        border: 2.5px solid transparent;
        background: #f0f4f8;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s ease, border-color 0.15s ease, background 0.15s ease;
        line-height: 1;
        padding: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .avatar-btn:hover { transform: scale(1.1); background: #e0eaf4; }
      .avatar-btn.selected {
        border-color: #0071dc;
        background: rgba(0,113,220,0.1);
        transform: scale(1.12);
        box-shadow: 0 0 0 3px rgba(0,113,220,0.25);
      }
      @media (max-width: 599px) {
        .avatar-btn { width: 46px; height: 46px; font-size: 24px; border-radius: 10px; }
        .avatar-picker { gap: 6px; }
      }
      .wmt-header {
        background: #0071dc;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        box-shadow: 0 2px 8px rgba(4,30,66,0.15);
      }
      .wmt-header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.01em;
        color: #fff;
      }
      .wmt-header-caption {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.85);
        text-align: right;
        line-height: 1.4;
      }
      .wmt-header-caption strong {
        color: #ffc220;
        font-weight: 700;
      }
      /* Topics API section */
      .topics-section {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1.5px solid var(--card-border, #e0e7ef);
        text-align: center;
      }
      #topicsBtn {
        background: #f0f4f8;
        color: #0071dc;
        border: 1.5px solid #0071dc;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s, transform 0.08s;
      }
      #topicsBtn:hover { background: rgba(0,113,220,0.09); transform: translateY(-1px); }
      #topicsBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
      #topicsResult {
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.6;
        text-align: left;
      }
      .topics-list {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .topics-list li {
        background: rgba(0,113,220,0.08);
        color: #0052a3;
        border: 1px solid rgba(0,113,220,0.2);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
      }
      .topics-unsupported { color: #888; font-style: italic; }
      .topics-empty { color: #546e7a; }
      .topics-error { color: #c0392b; }
    </style>
  </head>
  <body class="landing">
    <!-- Top header bar with logo + event caption -->
    <header class="wmt-header">
      <div class="wmt-header-brand">
        <svg width="36" height="32" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        BrainBlitz
      </div>
      <div class="wmt-header-caption">
        <strong>Walmart Retail Services</strong><br/>
        All Hands 2026 · Live Quiz Event ⚡
      </div>
    </header>

    <main class="card">
      <p class="tagline">Quiz o'clock. Are you ready? ⚡</p>

      <section class="join">
        <h2>Join a game</h2>
        <form id="joinForm">
          <div class="join-fields">
            <input
              type="text"
              id="code"
              placeholder="ROOM CODE"
              maxlength="6"
              autocomplete="off"
              autocapitalize="characters"
              inputmode="text"
              spellcheck="false"
              required
            />
            <input
              type="text"
              id="name"
              placeholder="Your name"
              maxlength="24"
              autocomplete="nickname"
              autocapitalize="words"
              inputmode="text"
              required
            />
          </div>
          <div class="avatar-section">
            <div class="avatar-label">Pick your avatar</div>
            <div id="avatarPicker" class="avatar-picker"></div>
            <input type="hidden" id="avatarInput" value="🦁" />
          </div>
          <div class="join-submit">
            <button type="submit" class="primary">Join →</button>
          </div>
        </form>
        <div id="formMsg" class="msg" style="min-height:1.4em;margin-top:6px;"></div>
      </section>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:#546e7a;">
        <a href="/rules.html" style="color:#0071dc;font-weight:600;text-decoration:none;">📋 How to play &amp; Rules</a>
      </p>

      <!-- Chrome Topics API demo -->
      <div class="topics-section">
        <button type="button" id="topicsBtn">🔍 Show My Interest Topics</button>
        <div id="topicsResult"></div>
      </div>
    </main>

    <script>
      (function () {
        const AVATARS = ['🦁','🐯','🐻','🦊','🐼','🐨','🐸','🐙','🦋','🦄','🐬','🦅','🐲','🦖','🌟','🔥'];

        // Build avatar picker
        const picker = document.getElementById('avatarPicker');
        const avatarInput = document.getElementById('avatarInput');
        const savedAvatar = sessionStorage.getItem('qb:avatar') || AVATARS[0];

        AVATARS.forEach((emoji) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'avatar-btn' + (emoji === savedAvatar ? ' selected' : '');
          btn.textContent = emoji;
          btn.setAttribute('aria-label', emoji);
          btn.addEventListener('click', () => {
            picker.querySelectorAll('.avatar-btn').forEach((b) => b.classList.remove('selected'));
            btn.classList.add('selected');
            avatarInput.value = emoji;
          });
          picker.appendChild(btn);
        });
        avatarInput.value = savedAvatar;

        const params = new URLSearchParams(location.search);
        const preCode = (params.get('code') || '').toUpperCase().trim();
        // Pre-fill code from URL param or last used session value
        const savedCode = sessionStorage.getItem('qb:code') || '';
        const savedName = sessionStorage.getItem('qb:name') || '';
        if (preCode) {
          document.getElementById('code').value = preCode;
        } else if (savedCode) {
          document.getElementById('code').value = savedCode;
        }
        if (savedName) {
          document.getElementById('name').value = savedName;
          // Focus name field so they can easily edit it
          document.getElementById('name').focus();
          document.getElementById('name').select();
        } else if (preCode || savedCode) {
          document.getElementById('name').focus();
        }
        // Show error if redirected back from a failed join
        const joinErr = sessionStorage.getItem('qb:joinError');
        if (joinErr) {
          sessionStorage.removeItem('qb:joinError');
          const msg = document.getElementById('formMsg');
          msg.textContent = '⚠️ ' + joinErr;
          msg.className = 'msg error';
        }
      })();

      // ---- Chrome Topics API ----
      // Spec: https://privacysandbox.google.com/intl/en_us/news/topics-api
      // Topic IDs are IAB taxonomy integers. This partial map covers the most
      // common top-level categories (full list: ~469 entries).
      const TOPICS_TAXONOMY = {
        1: 'Arts & Entertainment', 2: 'Automotive', 3: 'Beauty & Fitness',
        4: 'Books & Literature', 5: 'Business & Industrial', 6: 'Computers & Electronics',
        7: 'Finance', 8: 'Food & Drink', 9: 'Games', 10: 'Health',
        11: 'Hobbies & Leisure', 12: 'Home & Garden', 13: 'Internet & Telecom',
        14: 'Jobs & Education', 15: 'Law & Government', 16: 'News',
        17: 'Online Communities', 18: 'People & Society', 19: 'Pets & Animals',
        20: 'Real Estate', 21: 'Reference', 22: 'Science', 23: 'Shopping',
        24: 'Sports', 25: 'Travel', 26: 'World Localities',
        // Common sub-topics
        57: 'Action & Adventure Games', 58: 'Casual Games', 59: 'Music',
        60: 'Movies', 61: 'Television', 62: 'Cooking & Recipes',
        63: 'Fitness', 64: 'Basketball', 65: 'Soccer', 66: 'Tennis',
        67: 'Swimming', 68: 'Running & Walking', 69: 'Technology News',
        70: 'Mobile Phones', 71: 'Laptops & Notebooks', 72: 'Investing',
        73: 'Banking', 74: 'Fashion & Style', 75: 'Hair Care',
        76: 'Dog Care', 77: 'Cat Care', 78: 'Job Search',
        79: 'Higher Education', 80: 'K-12 Education',
      };

      function topicLabel(id) {
        return TOPICS_TAXONOMY[id] ? `${TOPICS_TAXONOMY[id]} (${id})` : `Topic #${id}`;
      }

      (function initTopicsBtn() {
        const btn = document.getElementById('topicsBtn');
        const result = document.getElementById('topicsResult');

        // Feature detection
        if (!('browsingTopics' in document)) {
          btn.textContent = '🔍 Show My Interest Topics';
          btn.addEventListener('click', () => {
            result.innerHTML = '<span class="topics-unsupported">Topics API not supported — requires Chrome 115+ with Privacy Sandbox enabled.</span>';
          });
          return;
        }

        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Loading…';
          result.innerHTML = '';
          try {
            // Try skipObservation (Chrome 123+), fall back to no-args (Chrome 115–122),
            // fall back to mock data when attestation blocks localhost
            let topics;
            let isMock = false;
            try {
              topics = await document.browsingTopics({ skipObservation: true });
            } catch (_e1) {
              try {
                topics = await document.browsingTopics();
              } catch (_e2) {
                // Attestation/enrollment check blocks localhost — use mock data so UI is demonstrable
                isMock = true;
                topics = [
                  { topic: 9 },   // Games
                  { topic: 24 },  // Sports
                  { topic: 6 },   // Computers & Electronics
                  { topic: 1 },   // Arts & Entertainment
                  { topic: 8 },   // Food & Drink
                  { topic: 22 },  // Science
                ];
              }
            }

            if (!topics || topics.length === 0) {
              result.innerHTML = '<p class="topics-empty">No topics found yet. Chrome needs a few weeks of browsing history to populate interests.</p>';
            } else {
              const items = topics
                .map((t) => `<li>${topicLabel(t.topic)}</li>`)
                .join('');
              const mockBadge = isMock
                ? `<span style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">DEMO — real API blocked on localhost</span><br/>`
                : '';
              result.innerHTML = `
                <p style="color:#546e7a;font-size:12px;margin-bottom:4px;">
                  ${mockBadge}
                  Chrome reported <strong>${topics.length}</strong> interest topic${topics.length !== 1 ? 's' : ''}:
                </p>
                <ul class="topics-list">${items}</ul>
                <p style="color:#aaa;font-size:11px;margin-top:8px;">
                  ${isMock ? 'Mock data shown — deploy to an enrolled domain for real Topics API data.' : 'These are derived locally by Chrome — never sent to servers without your consent.'}
                </p>`;
            }
          } catch (err) {
            result.innerHTML = `<span class="topics-error">Error: ${err.message}</span>`;
          } finally {
            btn.disabled = false;
            btn.textContent = '🔍 Show My Interest Topics';
          }
        });
      })();

      document.getElementById('joinForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const code = document.getElementById('code').value.trim().toUpperCase();
        const name = document.getElementById('name').value.trim();
        const avatar = document.getElementById('avatarInput').value;
        const msg = document.getElementById('formMsg');
        if (!code) { msg.textContent = 'Enter a room code.'; msg.className = 'msg error'; return; }
        if (!name) { msg.textContent = 'Enter your name.'; msg.className = 'msg error'; return; }
        msg.textContent = '';
        sessionStorage.setItem('qb:name', name);
        sessionStorage.setItem('qb:code', code);
        sessionStorage.setItem('qb:avatar', avatar);
        location.href = '/player.html';
      });
    </script>
  </body>
</html>
