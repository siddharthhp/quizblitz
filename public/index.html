<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0071dc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>BrainBlitz — Join</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .avatar-section {
        margin: 4px 0 0;
      }
      .avatar-label {
        font-size: 13px;
        font-weight: 600;
        color: #546e7a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        text-align: left;
      }
      .avatar-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .avatar-btn {
        font-size: 28px;
        width: 52px;
        height: 52px;
        border-radius: 12px;
        border: 2.5px solid transparent;
        background: #f0f4f8;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s ease, border-color 0.15s ease, background 0.15s ease;
        line-height: 1;
        padding: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .avatar-btn:hover { transform: scale(1.1); background: #e0eaf4; }
      .avatar-btn.selected {
        border-color: #0071dc;
        background: rgba(0,113,220,0.1);
        transform: scale(1.12);
        box-shadow: 0 0 0 3px rgba(0,113,220,0.25);
      }
      @media (max-width: 599px) {
        .avatar-btn { width: 46px; height: 46px; font-size: 24px; border-radius: 10px; }
        .avatar-picker { gap: 6px; }
      }
      .wmt-header {
        background: #0071dc;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        box-shadow: 0 2px 8px rgba(4,30,66,0.15);
      }
      .wmt-header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.01em;
        color: #fff;
      }
      .wmt-header-caption {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.85);
        text-align: right;
        line-height: 1.4;
      }
      .wmt-header-caption strong {
        color: #ffc220;
        font-weight: 700;
      }
      /* No-game state */
      #no-game {
        text-align: center;
        padding: 40px 24px;
      }
      #no-game .no-game-icon {
        font-size: 64px;
        margin-bottom: 16px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      #no-game h2 {
        font-size: 24px;
        margin: 0 0 10px;
        color: #041e42;
      }
      #no-game p {
        color: #546e7a;
        font-size: 16px;
      }
    </style>
  </head>
  <body class="landing">
    <!-- Top header bar with logo + event caption -->
    <header class="wmt-header">
      <div class="wmt-header-brand">
        <svg width="36" height="32" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        BrainBlitz
      </div>
      <div class="wmt-header-caption">
        <strong>Walmart Retail Services</strong><br/>
        All Hands 2026 · Live Quiz Event ⚡
      </div>
    </header>

    <main class="card">
      <!-- No-game fallback (shown when no ?code= param) -->
      <div id="no-game" class="hidden">
        <div class="no-game-icon">🎯</div>
        <h2>No active game</h2>
        <p>Ask the host to share the join link or scan the QR code on the big screen.</p>
      </div>

      <!-- Join form (shown when ?code= param is present) -->
      <div id="join-form-wrap">
        <p class="tagline">Quiz o'clock. Are you ready? ⚡</p>

        <section class="join">
          <h2>Join the game</h2>
          <form id="joinForm">
            <div class="join-fields single">
              <input
                type="text"
                id="name"
                placeholder="Your name"
                maxlength="24"
                autocomplete="nickname"
                autocapitalize="words"
                inputmode="text"
                required
              />
            </div>
            <div class="avatar-section">
              <div class="avatar-label">Pick your avatar</div>
              <div id="avatarPicker" class="avatar-picker"></div>
              <input type="hidden" id="avatarInput" value="🦁" />
            </div>
            <div class="join-submit">
              <button type="submit" class="primary">Join →</button>
            </div>
          </form>
          <div id="formMsg" class="msg" style="min-height:1.4em;margin-top:6px;"></div>
        </section>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:#546e7a;">
          <a href="/rules.html" style="color:#0071dc;font-weight:600;text-decoration:none;">📋 How to play &amp; Rules</a>
        </p>
      </div>
    </main>

    <script>
      (async function () {
        const AVATARS = ['🦁','🐯','🐻','🦊','🐼','🐨','🐸','🐙','🦋','🦄','🐬','🦅','🐲','🦖','🌟','🔥'];

        const params = new URLSearchParams(location.search);
        const code = (params.get('code') || '').toUpperCase().trim();

        // No code — show no-game state
        if (!code) {
          document.getElementById('join-form-wrap').classList.add('hidden');
          document.getElementById('no-game').classList.remove('hidden');
          return;
        }

        // Check room state — redirect to teaser if game not yet open
        try {
          const res = await fetch(`/api/room/${code}`);
          if (res.ok) {
            const data = await res.json();
            if (data.state === 'teaser') {
              location.replace(`/teaser.html?code=${code}`);
              return;
            }
          }
        } catch { /* server unreachable — show join form anyway */ }

        // Persist code for player.js
        sessionStorage.setItem('qb:code', code);

        // Build avatar picker
        const picker = document.getElementById('avatarPicker');
        const avatarInput = document.getElementById('avatarInput');
        const savedAvatar = sessionStorage.getItem('qb:avatar') || AVATARS[0];

        AVATARS.forEach((emoji) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'avatar-btn' + (emoji === savedAvatar ? ' selected' : '');
          btn.textContent = emoji;
          btn.setAttribute('aria-label', emoji);
          btn.addEventListener('click', () => {
            picker.querySelectorAll('.avatar-btn').forEach((b) => b.classList.remove('selected'));
            btn.classList.add('selected');
            avatarInput.value = emoji;
          });
          picker.appendChild(btn);
        });
        avatarInput.value = savedAvatar;

        // Pre-fill saved name if available
        const savedName = sessionStorage.getItem('qb:name') || '';
        if (savedName) {
          document.getElementById('name').value = savedName;
          document.getElementById('name').focus();
          document.getElementById('name').select();
        } else {
          document.getElementById('name').focus();
        }

        // Show error if redirected back from a failed join
        const joinErr = sessionStorage.getItem('qb:joinError');
        if (joinErr) {
          sessionStorage.removeItem('qb:joinError');
          const msg = document.getElementById('formMsg');
          msg.textContent = '⚠️ ' + joinErr;
          msg.className = 'msg error';
        }

        document.getElementById('joinForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const name = document.getElementById('name').value.trim();
          const avatar = document.getElementById('avatarInput').value;
          const msg = document.getElementById('formMsg');
          if (!name) { msg.textContent = 'Enter your name.'; msg.className = 'msg error'; return; }
          msg.textContent = '';
          sessionStorage.setItem('qb:name', name);
          sessionStorage.setItem('qb:avatar', avatar);
          location.href = '/player.html';
        });
      })();
    </script>
  </body>
</html>
