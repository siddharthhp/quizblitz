<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BrainBlitz — Join</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      body { overflow-y: auto; }
      main { max-width: 680px; text-align: center; margin-top: 40px; width: 100%; }
      #step-join { text-align: center; }
      #step-join h1 { font-size: 36px; margin-bottom: 6px; }

      .join-url {
        font-size: 22px; color: var(--accent); margin-bottom: 30px;
        word-break: break-all; font-weight: 700;
      }
      #qrContainer {
        border-radius: 16px;
        padding: 16px;
        background: #fff;
        display: inline-block;
        margin: 0 auto 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        line-height: 0;
      }
      #qrContainer img, #qrContainer canvas {
        display: block;
        border-radius: 8px;
      }
      .scan-label {
        font-size: 20px; color: var(--muted);
        margin-bottom: 6px;
      }
      #playerCount {
        font-size: 18px; color: var(--fg); margin-top: 12px;
      }
      #playerCount span { color: var(--accent); font-weight: 700; }

      /* Mobile */
      @media (max-width: 599px) {
        main { margin-top: 16px; padding: 12px 12px 40px; }
        #step-join h1 { font-size: 26px; }
        .join-url { font-size: 14px; word-break: break-all; }
        .scan-label { font-size: 15px; }
        #playerCount { font-size: 15px; }
        #qrContainer { padding: 10px; }
      }
      /* Big-screen projector scaling */
      @media (min-width: 1200px) {
        main { max-width: 100%; padding: 40px 100px; }
        #step-join h1 { font-size: 52px; }
        .join-url { font-size: 28px; }
        #qrContainer { padding: 20px; }
        #qrContainer img, #qrContainer canvas { width: 340px !important; height: 340px !important; }
        .scan-label { font-size: 26px; }
        #playerCount { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <span class="logo small">
        <svg width="28" height="24" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        BrainBlitz · Join
      </span>
      <span id="statusPill" class="pill">Waiting…</span>
    </header>

    <main id="app">
      <section id="step-join" class="card">
        <h1>Scan to join!</h1>
        <div id="qrContainer"></div>
        <p class="scan-label">📱 Scan the QR code or visit</p>
        <p class="join-url" id="joinUrl"></p>
        <p id="playerCount"><span id="count">0</span> players joined</p>
      </section>

      <section id="step-noroom" class="card hidden">
        <h1>No active game</h1>
        <p>Ask the host to open this page with a <code>?room=XXXX</code> URL parameter.</p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const show = (id) => {
        document.querySelectorAll('main > section').forEach((s) => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
      };

      const params = new URLSearchParams(location.search);
      const room = (params.get('room') || '').toUpperCase().trim();
      if (!room) { show('step-noroom'); return; }

      const joinDeeplink = `${location.origin}/?code=${room}`;
      $('joinUrl').textContent = joinDeeplink;

      show('step-join');

      // Generate QR code via server endpoint — no client-side JS library needed
      const qrContainer = $('qrContainer');
      const qrImg = document.createElement('img');
      qrImg.src = `/api/qr?text=${encodeURIComponent(joinDeeplink)}&width=260&dark=%231a1638`;
      qrImg.width = 260;
      qrImg.height = 260;
      qrImg.style.borderRadius = '8px';
      qrImg.style.display = 'block';
      qrImg.alt = 'QR code';
      qrContainer.appendChild(qrImg);

      // Connect socket to display channel to get live player count
      const socket = io();
      socket.on('connect', () => {
        socket.emit('display:join', { code: room }, (ack) => {
          if (!ack?.ok) return;
          $('count').textContent = (ack.players || []).length;
          $('statusPill').textContent = 'Live';
        });
      });

      socket.on('roster', ({ players }) => {
        $('count').textContent = players.length;
      });

      socket.on('disconnect', () => {
        $('statusPill').textContent = 'Disconnected';
      });
    })();
    </script>
  </body>
</html>
