<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RetailBlitz — Join</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      body { overflow: hidden; }
      main { max-width: 680px; text-align: center; margin-top: 40px; }
      #step-join { text-align: center; }
      #step-join h1 { font-size: 36px; margin-bottom: 6px; }

      .join-code {
        font-size: 96px; letter-spacing: 0.18em; font-weight: 900;
        margin: 10px 0 6px;
        background: linear-gradient(90deg, #06d6a0, #118ab2, #c77dff);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .join-url {
        font-size: 22px; color: var(--muted); margin-bottom: 30px;
        word-break: break-all;
      }
      #qrContainer {
        border-radius: 16px;
        padding: 16px;
        background: #fff;
        display: inline-block;
        margin: 0 auto 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        line-height: 0;
      }
      #qrContainer img, #qrContainer canvas {
        display: block;
        border-radius: 8px;
      }
      .scan-label {
        font-size: 20px; color: var(--muted);
        margin-bottom: 6px;
      }
      #playerCount {
        font-size: 18px; color: var(--fg); margin-top: 12px;
      }
      #playerCount span { color: var(--accent); font-weight: 700; }

      /* Big-screen projector scaling */
      @media (min-width: 1200px) {
        main { max-width: 100%; padding: 40px 100px; }
        #step-join h1 { font-size: 52px; }
        .join-code { font-size: 140px; }
        .join-url { font-size: 28px; }
        #qrContainer { padding: 20px; }
        #qrContainer img, #qrContainer canvas { width: 340px !important; height: 340px !important; }
        .scan-label { font-size: 26px; }
        #playerCount { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <span class="logo small">
        <svg width="28" height="24" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        RetailBlitz · Join
      </span>
      <span id="statusPill" class="pill">Waiting…</span>
    </header>

    <main id="app">
      <section id="step-join" class="card">
        <h1>Scan to join!</h1>
        <div id="joinCode" class="join-code">------</div>
        <p class="join-url" id="joinUrl"></p>
        <div id="qrContainer"></div>
        <p class="scan-label">📱 Scan the QR code or go to</p>
        <p style="font-size:20px;font-weight:700;color:var(--accent);" id="siteUrl"></p>
        <p id="playerCount"><span id="count">0</span> players joined</p>
      </section>

      <section id="step-noroom" class="card hidden">
        <h1>No room code</h1>
        <p>Open this page with a <code>?room=XXXX</code> URL parameter.</p>
        <p>Example: <code>/join.html?room=ABC123</code></p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const show = (id) => {
        document.querySelectorAll('main > section').forEach((s) => s.classList.add('hidden'));
        $(id).classList.remove('hidden');
      };

      const params = new URLSearchParams(location.search);
      const room = (params.get('room') || '').toUpperCase().trim();
      if (!room) { show('step-noroom'); return; }

      const joinDeeplink = `${location.origin}/?code=${room}`;
      $('joinCode').textContent = room;
      $('joinUrl').textContent = location.origin;
      $('siteUrl').textContent = location.host;

      show('step-join');

      // Generate QR code — qrcodejs uses a div container, not a canvas
      const qrContainer = $('qrContainer');
      new QRCode(qrContainer, {
        text: joinDeeplink,
        width: 260,
        height: 260,
        colorDark: '#1a1638',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });

      // Connect socket to display channel to get live player count
      const socket = io();
      socket.on('connect', () => {
        socket.emit('display:join', { code: room }, (ack) => {
          if (!ack?.ok) return;
          $('count').textContent = (ack.players || []).length;
          $('statusPill').textContent = 'Live';
        });
      });

      socket.on('roster', ({ players }) => {
        $('count').textContent = players.length;
      });

      socket.on('disconnect', () => {
        $('statusPill').textContent = 'Disconnected';
      });
    })();
    </script>
  </body>
</html>
