<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0071dc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>RetailBlitz</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      /* Safe area insets for notched iPhones */
      .bar {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
      }
      main {
        padding-bottom: max(60px, calc(env(safe-area-inset-bottom) + 24px));
      }
    </style>
  </head>
  <body class="player">
    <header class="bar">
      <span class="logo small">
        <svg width="26" height="22" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        RetailBlitz
      </span>
      <span id="meName" class="pill"></span>
      <span id="meScore" class="pill score">0</span>
    </header>

    <main id="app">
      <section id="step-waiting" class="card">
        <h1>Connecting…</h1>
        <p id="waitingMsg" class="msg">Joining room <strong id="waitingCode"></strong>…</p>
      </section>

      <section id="step-lobby" class="card hidden">
        <h1>You're in!</h1>
        <p>Hang tight — waiting for the host to start.</p>
        <p style="font-size:15px;color:var(--muted);"><span id="lobbyCount" style="color:var(--accent);font-weight:700;font-size:22px;">1</span> player(s) joined</p>
        <p class="dim">Your answer history is saved on this device.</p>
      </section>

      <section id="step-question" class="card hidden">
        <div class="qmeta">
          <span id="qIndex">Q 1 / 1</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="qStatus" class="pill" style="font-size:13px;"></span>
            <span id="qTimer" class="timer">20</span>
          </div>
        </div>
        <h1 id="qText">…</h1>
        <ul id="qOptions" class="options player-options"></ul>
      </section>

      <section id="step-reveal" class="card hidden">
        <h1 id="revealHeadline">…</h1>
        <p id="revealDetail" class="msg"></p>
        <p id="revealPoints" style="font-size:22px;font-weight:700;margin:8px 0 4px;"></p>
        <p style="color:var(--muted);font-size:14px;">Total score: <strong id="revealScore" style="color:var(--fg);">0</strong></p>
        <p id="revealFastest" class="hidden" style="margin-top:8px;font-size:14px;color:var(--accent);"></p>
      </section>

      <section id="step-finished" class="card hidden">
        <h1>Game over!</h1>
        <div id="myRankBanner" class="hidden" style="margin:0 0 16px;padding:14px 18px;border-radius:12px;background:linear-gradient(90deg,rgba(0,113,220,0.1),rgba(255,194,32,0.1));border:1.5px solid #0071dc;font-size:18px;text-align:center;color:#041e42;"></div>
        <p>Your final score: <strong id="finalScore">0</strong></p>
        <h2>Leaderboard</h2>
        <ol id="finalBoard" class="leaderboard"></ol>
        <h2>Your history (this device)</h2>
        <ol id="history" class="history"></ol>

      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/player.js"></script>
  </body>
</html>
