<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0071dc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BrainBlitz</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      /* Safe area insets for notched iPhones */
      .bar {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
      }
      main {
        padding-bottom: max(60px, calc(env(safe-area-inset-bottom) + 24px));
      }

      /* Lobby waiting screen */
      #step-lobby { text-align: center; }
      #lobby-inner { position: relative; }

      /* Floating emoji burst */
      #lobby-emoji-burst {
        position: relative;
        height: 60px;
        margin-bottom: 12px;
        overflow: visible;
      }
      .float-emoji {
        position: absolute;
        font-size: 28px;
        animation: float-up 3s ease-in-out infinite;
        opacity: 0;
      }
      @keyframes float-up {
        0%   { opacity: 0; transform: translateY(20px) scale(0.7) rotate(-10deg); }
        20%  { opacity: 1; transform: translateY(0)    scale(1)   rotate(5deg); }
        80%  { opacity: 1; transform: translateY(-12px) scale(1)  rotate(-3deg); }
        100% { opacity: 0; transform: translateY(-30px) scale(0.8) rotate(8deg); }
      }

      /* Pulsing dot */
      .lobby-pulse {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 1.4s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%, 100% { transform: scale(1);   opacity: 1; }
        50%       { transform: scale(1.6); opacity: 0.5; }
      }

      /* Tagline cycling */
      #lobby-tagline {
        transition: opacity 0.4s ease;
      }
      #lobby-tagline.fade-out { opacity: 0; }
    </style>
  </head>
  <body class="player">
    <header class="bar">
      <span class="logo small">
        <svg width="26" height="22" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
          <path d="M4 6 H10 L14 28 H40 L44 14 H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="34" r="3.5" fill="white"/>
          <circle cx="35" cy="34" r="3.5" fill="white"/>
          <path d="M33 6 L21 22 H29 L26 36 L40 18 H31 Z" fill="#ffc220"/>
        </svg>
        BrainBlitz
      </span>
      <span id="meName" class="pill"></span>
      <span id="meScore" class="pill score">0</span>
    </header>

    <main id="app">
      <section id="step-waiting" class="card">
        <h1>Connecting…</h1>
        <p id="waitingMsg" class="msg">Connecting…</p>
      </section>

      <section id="step-lobby" class="card hidden">
        <div id="lobby-inner">
          <div id="lobby-emoji-burst" aria-hidden="true"></div>
          <h1 style="margin-bottom:4px;">You're in! 🎉</h1>
          <p id="lobby-tagline" style="font-size:16px;color:var(--muted);margin-bottom:16px;">Warming up the brain cells…</p>
          <div id="lobby-fact-box" style="background:linear-gradient(135deg,rgba(0,113,220,0.07),rgba(255,194,32,0.1));border:1.5px solid rgba(0,113,220,0.2);border-radius:12px;padding:14px 18px;margin-bottom:16px;min-height:56px;display:flex;align-items:center;gap:10px;">
            <span id="lobby-fact-icon" style="font-size:24px;flex-shrink:0;">🧠</span>
            <span id="lobby-fact-text" style="font-size:14px;color:var(--fg);line-height:1.5;font-style:italic;"></span>
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;">
            <div class="lobby-pulse"></div>
            <span style="font-size:15px;color:var(--muted);">Waiting for host to start</span>
          </div>
          <p style="font-size:14px;color:var(--muted);text-align:center;margin-top:8px;">
            <span id="lobbyCount" style="color:var(--accent);font-weight:700;font-size:20px;">1</span> player(s) in the room
          </p>
        </div>
      </section>

      <section id="step-question" class="card hidden">
        <div class="qmeta">
          <span id="qIndex">Q 1 / 1</span>
          <span id="qTimer" class="timer">20</span>
        </div>
        <h1 id="qText">…</h1>
        <div id="qStatus" class="diff-badge"></div>
        <ul id="qOptions" class="options player-options"></ul>
      </section>

      <section id="step-reveal" class="card hidden">
        <h1 id="revealHeadline">…</h1>
        <p id="revealDetail" class="msg"></p>
        <p id="revealPoints" style="font-size:22px;font-weight:700;margin:8px 0 4px;"></p>
        <p style="color:var(--muted);font-size:14px;">Total score: <strong id="revealScore" style="color:var(--fg);">0</strong></p>
        <p id="revealFastest" class="hidden" style="margin-top:8px;font-size:14px;color:var(--accent);"></p>
      </section>

      <section id="step-finished" class="card hidden">
        <h1>Game over!</h1>
        <div id="myRankBanner" class="hidden" style="margin:0 0 16px;padding:14px 18px;border-radius:12px;background:linear-gradient(90deg,rgba(0,113,220,0.1),rgba(255,194,32,0.1));border:1.5px solid #0071dc;font-size:18px;text-align:center;color:#041e42;"></div>
        <p>Your final score: <strong id="finalScore">0</strong></p>
        <h2>Leaderboard</h2>
        <ol id="finalBoard" class="leaderboard"></ol>
        <h2>Your history (this device)</h2>
        <ol id="history" class="history"></ol>

      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/player.js"></script>
  </body>
</html>
