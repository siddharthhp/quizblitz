<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#041e42" />
    <title>Retail Services — Something's Coming 👀</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue: #0071dc;
        --dark: #041e42;
        --gold: #ffc220;
        --muted: rgba(255,255,255,0.55);
      }

      html, body {
        min-height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark);
        color: #fff;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ---- Stars background ---- */
      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: #fff;
        animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
        opacity: 0;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: scale(0.8); }
        50%       { opacity: var(--op, 0.6); transform: scale(1); }
      }

      /* ---- Layout ---- */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px 60px;
        text-align: center;
      }

      /* ---- Logo ---- */
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
        animation: fade-down 0.6s ease both;
      }
      .logo-text {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: #fff;
      }
      @keyframes fade-down {
        from { opacity: 0; transform: translateY(-16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ---- Teaser headline ---- */
      .headline {
        font-size: clamp(32px, 6vw, 56px);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 12px;
        animation: fade-up 0.7s 0.1s ease both;
      }
      .headline .gold { color: var(--gold); }
      .subhead {
        font-size: clamp(16px, 2.5vw, 22px);
        color: var(--muted);
        font-weight: 500;
        margin-bottom: 40px;
        animation: fade-up 0.7s 0.2s ease both;
        max-width: 520px;
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ---- Cycling teaser copy ---- */
      .teaser-copy {
        font-size: 15px;
        color: rgba(255,255,255,0.5);
        font-style: italic;
        margin-bottom: 40px;
        min-height: 22px;
        transition: opacity 0.4s ease;
        animation: fade-up 0.7s 0.3s ease both;
      }
      .teaser-copy.fade { opacity: 0; }

      /* ---- Countdown ---- */
      .countdown-wrap {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 52px;
        animation: fade-up 0.7s 0.35s ease both;
      }
      .cd-block {
        background: rgba(255,255,255,0.07);
        border: 1.5px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 18px 22px;
        min-width: 80px;
        backdrop-filter: blur(8px);
        transition: background 0.3s;
      }
      .cd-block:hover { background: rgba(255,255,255,0.1); }
      .cd-num {
        font-size: clamp(36px, 6vw, 52px);
        font-weight: 900;
        line-height: 1;
        color: var(--gold);
        display: block;
        font-variant-numeric: tabular-nums;
      }
      .cd-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-top: 6px;
        display: block;
      }

      /* ---- Mystery boxes ---- */
      .boxes-section {
        margin-bottom: 48px;
        animation: fade-up 0.7s 0.45s ease both;
      }
      .boxes-label {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .boxes {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* 3D flip card */
      .box-wrap {
        width: 100px;
        height: 100px;
        perspective: 600px;
        cursor: pointer;
      }
      .box-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        animation: idle-bob var(--bob-dur, 3s) ease-in-out infinite var(--bob-delay, 0s);
      }
      .box-wrap:hover .box-inner,
      .box-wrap.flipped .box-inner {
        transform: rotateY(180deg);
        animation: none;
      }
      @keyframes idle-bob {
        0%, 100% { transform: translateY(0) rotateZ(-2deg); }
        50%       { transform: translateY(-8px) rotateZ(2deg); }
      }
      .box-face {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        font-size: 42px;
      }
      .box-front {
        background: linear-gradient(135deg, #1a3a6b, #0071dc);
        border: 2px solid rgba(255,255,255,0.15);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        flex-direction: column;
        gap: 4px;
      }
      .box-front .box-lid {
        font-size: 28px;
        animation: lid-jiggle 4s ease-in-out infinite var(--jiggle-delay, 0s);
      }
      @keyframes lid-jiggle {
        0%, 85%, 100% { transform: translateY(0) rotate(0deg); }
        88%  { transform: translateY(-4px) rotate(-6deg); }
        91%  { transform: translateY(-6px) rotate(6deg); }
        94%  { transform: translateY(-3px) rotate(-3deg); }
        97%  { transform: translateY(-1px) rotate(2deg); }
      }
      .box-front .box-q {
        font-size: 22px;
        font-weight: 900;
        color: var(--gold);
      }
      .box-back {
        background: linear-gradient(135deg, #7a4a00, #ffc220);
        border: 2px solid rgba(255,255,255,0.25);
        box-shadow: 0 8px 32px rgba(255,194,32,0.35);
        transform: rotateY(180deg);
        flex-direction: column;
        gap: 2px;
      }
      .box-back .box-reveal-emoji { font-size: 36px; }
      .box-back .box-reveal-text {
        font-size: 11px;
        font-weight: 800;
        color: rgba(0,0,0,0.6);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0 8px;
        text-align: center;
      }

      /* Sparkle on flip */
      .box-wrap.flipped::after {
        content: '✨';
        position: absolute;
        top: -12px;
        right: -8px;
        font-size: 22px;
        animation: sparkle-pop 0.5s ease forwards;
        pointer-events: none;
      }
      @keyframes sparkle-pop {
        from { opacity: 0; transform: scale(0) rotate(-20deg); }
        60%  { opacity: 1; transform: scale(1.3) rotate(10deg); }
        to   { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      /* ---- Pulsing glow dot ---- */
      .live-dot {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: rgba(255,255,255,0.07);
        border: 1.5px solid rgba(255,255,255,0.12);
        border-radius: 999px;
        padding: 7px 16px;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        animation: fade-up 0.7s 0.5s ease both;
        margin-bottom: 12px;
      }
      .live-dot::before {
        content: '';
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--gold);
        animation: pulse-dot 1.6s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse-dot {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,194,32,0.6); }
        50%       { box-shadow: 0 0 0 6px rgba(255,194,32,0); }
      }

      /* ---- Go-live overlay ---- */
      #golive-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(4,30,66,0.96);
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      #golive-overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .golive-icon { font-size: 72px; margin-bottom: 16px; animation: bounce 0.6s ease infinite alternate; }
      @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
      .golive-title { font-size: 36px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
      .golive-sub   { font-size: 18px; color: var(--muted); margin-bottom: 28px; }
      .golive-btn   {
        background: var(--gold); color: var(--dark);
        border: none; border-radius: 14px;
        padding: 16px 36px; font-size: 18px; font-weight: 800;
        cursor: pointer; font-family: inherit;
        box-shadow: 0 4px 24px rgba(255,194,32,0.4);
        transition: transform 0.1s ease;
      }
      .golive-btn:hover { transform: translateY(-2px); }

      /* ---- Responsive ---- */
      @media (max-width: 480px) {
        .cd-block { padding: 14px 16px; min-width: 66px; }
        .box-wrap { width: 84px; height: 84px; }
        .boxes { gap: 14px; }
        .box-face { font-size: 32px; }
        .cd-label { font-size: 10px; }
      }
      /* Extra-small devices */
      @media (max-width: 360px) {
        .page { padding: 24px 12px 40px; }
        .cd-block { padding: 10px 12px; min-width: 58px; }
        .cd-num { font-size: 28px; }
        .countdown-wrap { gap: 8px; }
        .box-wrap { width: 72px; height: 72px; }
        .boxes { gap: 10px; }
        .box-face { font-size: 26px; }
      }
    </style>
  </head>
  <body>
    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- Go-live overlay (shown when host opens room / timer ends) -->
    <div id="golive-overlay">
      <div class="golive-icon">🚀</div>
      <div class="golive-title">It's time!</div>
      <div class="golive-sub">The quiz is now open. Let's go!</div>
      <button class="golive-btn" id="goliveJoinBtn">Join the quiz →</button>
    </div>

    <div class="page">
      <!-- Logo -->
      <div class="logo-wrap">
        <span class="logo-text">Retail Services</span>
      </div>

      <!-- Headline -->
      <h1 class="headline">Something big is<br><span class="gold">coming for you 👀</span></h1>
      <p class="subhead">A quiz is loading up. Sharpen those neurons — you'll need them.</p>

      <!-- Cycling teaser copy -->
      <p class="teaser-copy" id="teaserCopy">🤫 The questions are locked in a vault...</p>

      <!-- Countdown -->
      <div class="countdown-wrap" id="countdown">
        <div class="cd-block"><span class="cd-num" id="cd-d">--</span><span class="cd-label">Days</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-h">--</span><span class="cd-label">Hours</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-m">--</span><span class="cd-label">Mins</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-s">--</span><span class="cd-label">Secs</span></div>
      </div>

      <!-- Mystery boxes -->
      <div class="boxes-section">
        <div class="boxes" id="mysteryBoxes"></div>
      </div>

      <!-- Live indicator -->
      <p class="live-dot" id="liveDot">This page updates live — you'll know the second it starts</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (() => {
      // Room code — set when host creates room and broadcasts it
      let liveCode = null;

      // ---- Stars ----
      const starsEl = document.getElementById('stars');
      for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = [
          `width:${size}px`, `height:${size}px`,
          `top:${Math.random()*100}%`, `left:${Math.random()*100}%`,
          `--d:${(Math.random()*3+2).toFixed(1)}s`,
          `--delay:${(Math.random()*4).toFixed(1)}s`,
          `--op:${(Math.random()*0.5+0.2).toFixed(2)}`,
        ].join(';');
        starsEl.appendChild(s);
      }

      // ---- Mystery boxes ----
      const BOX_DATA = [
        { emoji: '🧠', hint: 'Brain power' },
        { emoji: '⚡', hint: 'Fast & furious' },
        { emoji: '🏆', hint: 'Glory awaits' },
        { emoji: '🎯', hint: 'On the mark' },
        { emoji: '🔥', hint: 'Hot takes' },
        { emoji: '💡', hint: 'Lightbulb moments' },
      ];
      const chosen = BOX_DATA.sort(() => Math.random() - 0.5).slice(0, 3);
      const boxesEl = document.getElementById('mysteryBoxes');
      chosen.forEach((box, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'box-wrap';
        wrap.innerHTML = `
          <div class="box-inner" style="--bob-dur:${2.5+i*0.4}s;--bob-delay:${i*0.3}s">
            <div class="box-face box-front">
              <span class="box-lid" style="--jiggle-delay:${i*1.2}s">📦</span>
              <span class="box-q">?</span>
            </div>
            <div class="box-face box-back">
              <span class="box-reveal-emoji">${box.emoji}</span>
              <span class="box-reveal-text">${box.hint}</span>
            </div>
          </div>`;
        let flipTimeout;
        wrap.addEventListener('click', () => {
          if (wrap.classList.contains('flipped')) return;
          wrap.classList.add('flipped');
          clearTimeout(flipTimeout);
          flipTimeout = setTimeout(() => wrap.classList.remove('flipped'), 2200);
        });
        setTimeout(() => {
          setInterval(() => {
            if (wrap.classList.contains('flipped')) return;
            wrap.classList.add('flipped');
            setTimeout(() => wrap.classList.remove('flipped'), 2000);
          }, 5000 + i * 1800);
        }, 3000 + i * 1200);
        boxesEl.appendChild(wrap);
      });

      // ---- Cycling teaser copy ----
      const COPIES = [
        '🤫 The questions are locked in a vault...',
        '🧠 Your brain cells are about to get a workout',
        '🕵️ Something is brewing behind closed doors...',
        '⚡ The host is sharpening the questions right now',
        '🎯 Think you\'re smart? Prove it.',
        '🔒 Top secret quiz material. Do not peek.',
        '🌪️ A trivia storm is coming. Are you ready?',
        '🎲 Luck won\'t help you here. Only knowledge will.',
        '🦉 The wise prepare. The brave compete.',
        '🚀 T-minus... something. Stay tuned.',
      ];
      let copyIdx = 0;
      const copyEl = document.getElementById('teaserCopy');
      setInterval(() => {
        copyEl.classList.add('fade');
        setTimeout(() => {
          copyIdx = (copyIdx + 1) % COPIES.length;
          copyEl.textContent = COPIES[copyIdx];
          copyEl.classList.remove('fade');
        }, 400);
      }, 4000);

      // ---- Countdown ----
      // Friday 4 July 2026, 12:00 PM IST = 06:30 UTC
      const targetTime = new Date('2026-07-02T06:30:00Z').getTime();
      let timerEnded   = false;

      function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

      function onTimerEnd() {
        if (timerEnded) return;
        timerEnded = true;
        // Replace countdown with "Join the room" button
        const wrap = document.getElementById('countdown');
        wrap.innerHTML = liveCode
          ? `<a href="/?code=${liveCode}" class="golive-btn" style="text-decoration:none;display:inline-block;">🚀 Join the quiz →</a>`
          : `<button class="golive-btn" id="waitingJoinBtn" disabled style="opacity:0.6;cursor:not-allowed;">⏳ Waiting for host to open room…</button>`;
      }

      // Use sessionStorage so the flag survives the reload itself — prevents loop
      const REFRESH_KEY = 'bb:teaser5minRefreshed';
      let refreshed5Min = !!sessionStorage.getItem(REFRESH_KEY);
      function updateCountdown() {
        const diff = targetTime - Date.now();
        if (diff <= 0) {
          ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
          onTimerEnd();
          return;
        }
        // Hard refresh 5 minutes before start (once) so socket reconnects fresh
        if (!refreshed5Min && diff <= 5 * 60 * 1000) {
          refreshed5Min = true;
          sessionStorage.setItem(REFRESH_KEY, '1');
          setTimeout(() => location.reload(), 500);
          return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('cd-d').textContent = pad(d);
        document.getElementById('cd-h').textContent = pad(h);
        document.getElementById('cd-m').textContent = pad(m);
        document.getElementById('cd-s').textContent = pad(s);
      }
      updateCountdown();
      setInterval(updateCountdown, 1000);

      // visibilitychange is reliable even after days of idle —
      // fires the moment user switches back to the tab.
      // If we're within 10 mins of start time, reload immediately.
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;
        if (timerEnded) return;
        if (refreshed5Min) return; // already refreshed this session
        const diff = targetTime - Date.now();
        if (diff <= 10 * 60 * 1000) {
          refreshed5Min = true;
          sessionStorage.setItem(REFRESH_KEY, '1');
          location.reload();
        }
      });

      // ---- Go-live: room code received from host ----
      function onRoomReady(code) {
        liveCode = code;
        // If timer already ended, activate the join button immediately
        if (timerEnded) {
          const wrap = document.getElementById('countdown');
          wrap.innerHTML = `<a href="/?code=${code}" class="golive-btn" style="text-decoration:none;display:inline-block;">🚀 Join the quiz →</a>`;
          return;
        }
        // Timer still running — show a pulsing "Room is ready!" notice below live dot
        const liveDot = document.getElementById('liveDot');
        if (liveDot) liveDot.textContent = '✅ Room is ready — join when the timer hits zero!';
        // Also show the go-live overlay immediately so eager players can jump in
        triggerGoLive(code);
      }

      function triggerGoLive(code) {
        const overlay = document.getElementById('golive-overlay');
        overlay.classList.add('show');
        document.getElementById('goliveJoinBtn').onclick = () => location.href = `/?code=${code}`;
        for (let i = 0; i < 30; i++) {
          const s = document.createElement('div');
          s.style.cssText = `position:fixed;z-index:101;pointer-events:none;font-size:${20+Math.random()*20}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation:sparkle-pop 0.8s ${Math.random()*0.5}s ease both;`;
          s.textContent = ['🎉','⭐','✨','🔥','🎊'][Math.floor(Math.random()*5)];
          document.body.appendChild(s);
        }
      }

      // ---- Socket: subscribe to global:teaser channel ----
      const socket = io();
      socket.on('connect', () => {
        socket.emit('teaser:watchGlobal', {}, (ack) => {
          if (ack?.code) onRoomReady(ack.code); // room already exists
        });
      });
      socket.on('global:roomReady', ({ code }) => onRoomReady(code));
      socket.on('disconnect', () => {
        document.getElementById('liveDot').textContent = '⚡ Reconnecting…';
      });
      socket.on('connect', () => {
        document.getElementById('liveDot').textContent = 'This page updates live — you\'ll know the second it starts';
      });
    })();
    </script>
  </body>
</html>
